{% extends "admin/base.html" %}
{% block title %}Broadcast{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-2">📢 Broadcast Message</h1>
    <p class="text-gray-600 mb-6">Send a WhatsApp message to all users or a specific group.</p>

    <div class="bg-white p-6 rounded-lg shadow-md">
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Target Group (optional)</label>
                <select name="group_id"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">All Users</option>
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.name }} ({{ g.users.count() }} members)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Message *</label>
                <textarea name="message" rows="6" required placeholder="Type your WhatsApp message here..."
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
            </div>
            <button type="submit" onclick="return confirm('Send this broadcast?')"
                class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-semibold">
                📤 Send Broadcast
            </button>
        </form>
    </div>
</div>
{% endblock %}
