{% extends "admin/base.html" %}
{% block title %}Broadcast{% endblock %}
{% block content %}
<div class="max-w-xl">
    <div class="eyebrow mb-1">Outbound</div>
    <h2 class="font-display font-bold text-xl text-ink mb-2">Broadcast Message</h2>
    <p class="text-slate text-sm mb-6">Send a WhatsApp message to all users or a specific group.</p>

    <div class="panel p-6">
        <form method="POST">
            <div class="mb-4">
                <label class="field-label">Target Group (optional)</label>
                <select name="group_id" class="field-input">
                    <option value="">All Users</option>
                    {% for g in groups %}
                    <option value="{{ g.id }}">{{ g.name }} ({{ g.users.count() }} members)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-5">
                <label class="field-label">Message *</label>
                <textarea name="message" rows="6" required placeholder="Type your WhatsApp message here..." class="field-input"></textarea>
            </div>
            <button type="submit" onclick="return confirm('Send this broadcast?')" class="btn btn-primary w-full">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                Send Broadcast
            </button>
        </form>
    </div>
</div>
{% endblock %}
